<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="arena-title arena-desc">
  <title id="arena-title">Midnight pet hotel arena</title>
  <desc id="arena-desc">A dark indigo pet-hotel room with warm lamps, little sleeping nooks, and a teal woven rug.</desc>
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12132f"/>
      <stop offset=".72" stop-color="#242445"/>
      <stop offset="1" stop-color="#2d2947"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#28233f"/>
      <stop offset="1" stop-color="#15142b"/>
    </linearGradient>
    <radialGradient id="window-glow" cx="50%" cy="38%" r="64%">
      <stop offset="0" stop-color="#8bdacf" stop-opacity=".3"/>
      <stop offset="1" stop-color="#25314f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lamp-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffd58b" stop-opacity=".65"/>
      <stop offset=".55" stop-color="#ffbb6b" stop-opacity=".2"/>
      <stop offset="1" stop-color="#ffbb6b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rug" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#317f83"/>
      <stop offset=".5" stop-color="#2b696f"/>
      <stop offset="1" stop-color="#22525f"/>
    </linearGradient>
    <linearGradient id="shade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd98e"/>
      <stop offset=".5" stop-color="#ffbf6c"/>
      <stop offset="1" stop-color="#e98855"/>
    </linearGradient>
    <pattern id="wallpaper" width="74" height="74" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M0 37h74M37 0v74" fill="none" stroke="#8684af" stroke-opacity=".045" stroke-width="2"/>
      <circle cx="37" cy="37" r="4" fill="#8fd6ce" opacity=".035"/>
    </pattern>
    <pattern id="weave" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
      <path d="M0 4h22M0 15h22" stroke="#fff2d2" stroke-width="2" opacity=".09"/>
      <path d="M5 0v22M16 0v22" stroke="#102e40" stroke-width="2" opacity=".12"/>
    </pattern>
    <filter id="blur-24" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9" result="blur"/>
      <feOffset dy="12" result="offset"/>
      <feColorMatrix in="offset" type="matrix" values="0 0 0 0 0.04 0 0 0 0 0.035 0 0 0 0 0.11 0 0 0 .42 0" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

